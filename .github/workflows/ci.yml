name: CI

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'infra/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [v2, main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'infra/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-build:
    name: CI · API compile + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore HOPTranscribe.sln

      - name: Build solution (Release)
        run: dotnet build HOPTranscribe.sln --configuration Release --no-restore /warnaserror

      - name: Test
        run: |
          dotnet test api.tests/HOPTranscribe.Api.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory api.tests/TestResults \
            --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api.tests/TestResults
          retention-days: 7

  web-build:
    name: CI · Web compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check + production compile
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: web/dist
          retention-days: 7

  docker-build:
    name: CI · Docker image build check (no push)
    runs-on: ubuntu-latest
    needs: [api-build, web-build]
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: api, context: api }
          - { name: web, context: web }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.component.name }} image without pushing
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,scope=${{ matrix.component.name }},mode=max
          platforms: linux/amd64

  terraform-validate:
    name: Terraform · fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/azure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.5'
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

