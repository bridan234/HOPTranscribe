name: v2 CI

on:
  push:
    branches: [v2]
    paths:
      - 'v2/**'
      - '.github/workflows/v2-ci.yml'
  pull_request:
    branches: [v2, main]
    paths:
      - 'v2/**'
      - '.github/workflows/v2-ci.yml'
  workflow_dispatch:

concurrency:
  group: v2-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-build:
    name: API · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('v2/api/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore HOPTranscribe.Api.csproj

      - name: Build (Release)
        run: dotnet build HOPTranscribe.Api.csproj --configuration Release --no-restore /warnaserror

      # Tests are not yet present in v2 — re-enable when the test project lands.
      # - name: Test
      #   run: dotnet test --configuration Release --no-build --logger "trx" --results-directory TestResults
      #
      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: api-test-results
      #     path: v2/api/TestResults

  web-build:
    name: Web · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: v2/web/dist
          retention-days: 7

  docker-build:
    name: Docker · build (no push)
    runs-on: ubuntu-latest
    needs: [api-build, web-build]
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: api, context: v2/api }
          - { name: web, context: v2/web }
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.component.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,scope=${{ matrix.component.name }},mode=max
          platforms: linux/amd64

  terraform-validate:
    name: Terraform · fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2/infra/azure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.5'
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate
