services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hoptranscribe-v2-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Jwt__SigningKey=${JWT_SIGNING_KEY}
      - ConnectionStrings__SessionDb=Data Source=/data/sessions.db
      - AllowedOrigins__0=http://localhost:3000
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    volumes:
      - api-data:/data
      - api-logs:/app/logs
    networks:
      - hoptranscribe-v2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5001}
    container_name: hoptranscribe-v2-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hoptranscribe-v2
    restart: unless-stopped

networks:
  hoptranscribe-v2:
    driver: bridge

volumes:
  api-data:
    driver: local
  api-logs:
    driver: local
